<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GJ Titans | Official Website</title>

  <link rel="stylesheet" href="assets/css/home-single.css">
</head>

<body>

<section class="scene" id="scene">
  <div class="scene-bg"></div>

  <div class="scene-hint">CLICK LOGO</div>

  <!-- SVG arcs (BEHIND logo) -->
  <svg class="energy-arcs" id="energyArcs">
    <defs>
      <linearGradient id="grad-squad" gradientUnits="userSpaceOnUse"></linearGradient>
      <linearGradient id="grad-fixtures" gradientUnits="userSpaceOnUse"></linearGradient>
      <linearGradient id="grad-gallery" gradientUnits="userSpaceOnUse"></linearGradient>
    </defs>

    <path id="arc-squad"/>
    <path id="arc-fixtures"/>
    <path id="arc-gallery"/>

    <circle id="dot-squad" class="arc-dot"/>
    <circle id="dot-fixtures" class="arc-dot"/>
    <circle id="dot-gallery" class="arc-dot"/>
  </svg>

  <!-- LOGO -->
  <button class="logo-core" id="logoCore">
    <img src="assets/images/logo.png" alt="GJ Titans Logo">
  </button>

  <!-- MENU -->
  <div class="radial-menu">
    <button class="menu-item" data-key="squad">
      <span class="mi-icon">🪖</span>
      <span class="mi-text">SQUAD</span>
    </button>

    <button class="menu-item" data-key="fixtures">
      <span class="mi-icon">📅</span>
      <span class="mi-text">FIXTURES</span>
    </button>

    <button class="menu-item" data-key="gallery">
      <span class="mi-icon">🖼️</span>
      <span class="mi-text">GALLERY</span>
    </button>
  </div>

</section>

<script src="assets/js/home-single.js"></script>
</body>
</html>
