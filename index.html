<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GJ Titans</title>

  <!-- Favicon -->
  <link rel="icon" href="assets/images/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/images/logo.png">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>

<body>

<!-- ================= HERO ================= -->
<header class="hero">
  <div class="hero-logo-wrapper">
    <img src="assets/images/logo.png" alt="GJ Titans logo" class="hero__logo">
  </div>

  <button class="scroll-cue" id="scrollCue" type="button">
    <span>Scroll</span>
    <span class="scroll-cue__arrow">↓</span>
  </button>
</header>

<!-- ================= NAV ================= -->
<nav class="nav">
  <button class="nav__btn is-active" data-tab="fixtures">Fixtures</button>
  <button class="nav__btn" data-tab="squad">Squad</button>
  <button class="nav__btn" data-tab="gallery">Gallery</button>
</nav>

<!-- ================= CONTENT ================= -->
<main class="main" id="content">

  <!-- ========= FIXTURES (DATA‑DRIVEN) ========= -->
  <section class="page is-active" id="fixtures">
    <h1 class="page__title reveal">Fixtures</h1>
    

    <!-- ✅ JS will render accordion fixture tiles here -->
    <div class="fixtures-grid" id="fixturesGrid"></div>
  </section>

  <!-- ========= SQUAD (DATA‑DRIVEN) ========= -->
  <section class="page" id="squad">
    <h1 class="page__title reveal">Squad</h1>
    <p class="page__subtitle reveal">Filter by role</p>

    <div class="filters reveal">
      <button class="filter-btn is-active" data-role="all">All</button>
      <button class="filter-btn" data-role="batsman">Batsmen</button>
      <button class="filter-btn" data-role="allrounder">All‑Rounders</button>
      <button class="filter-btn" data-role="bowler">Bowlers</button>
    </div>

    <!-- ✅ JS will render squad cards here -->
    <div class="squad-grid" id="squadGrid"></div>
  </section>

  <!-- ========= GALLERY ========= -->
  <section class="page" id="gallery">
    <h1 class="page__title reveal">Gallery</h1>
    <p class="page__subtitle reveal">Photos coming soon 📸</p>

    <div class="gallery-placeholder reveal">
      Photos coming soon 📸
    </div>
  </section>

</main>

<!-- ================= FOOTER ================= -->
<footer class="footer">
  <img src="assets/images/logo.png" class="footer__logo">
  <div class="footer__motto">United • Fearless • Titans</div>
</footer>

<!-- ================= JS ================= -->
<script src="assets/js/navigation.js" defer></script>
<script src="assets/js/render-fixtures.js" defer></script>
<script src="assets/js/render-squad.js" defer></script>
<script src="assets/js/filters.js" defer></script>
<script src="assets/js/main.js" defer></script>

</body>
</html>
