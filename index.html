<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GJ Titans | Official Website</title>

  <link rel="stylesheet" href="assets/css/home-single.css" />
</head>

<body>
  <section class="scene" id="scene">

    <div class="scene-hint">CLICK LOGO</div>

    <!-- LOGO -->
    <button class="logo-core" id="logoCore" type="button">
      <img src="assets/images/logo.png" alt="GJ Titans Logo">
    </button>

    <!-- RADIAL MENU -->
    <div class="radial-menu">
      <button class="menu-item" data-key="squad">
        <img src="assets/images/squad.png" alt="Squad">
        <span>SQUAD</span>
      </button>

      <button class="menu-item" data-key="gallery">
        <img src="assets/images/gallery.png" alt="Gallery">
        <span>GALLERY</span>
      </button>

      <button class="menu-item" data-key="fixtures">
        <img src="assets/images/fixtures.png" alt="Fixtures">
        <span>FIXTURES</span>
      </button>
    </div>

    <!-- CONTENT OVERLAY -->
    <div class="overlay" id="overlay">
      <div class="overlay-content">
        <button class="close-btn" id="closeOverlay">✕</button>
        <div id="overlayBody"></div>
      </div>
    </div>

  </section>

  <script src="assets/js/home-single.js"></script>
</body>
</html>
