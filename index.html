<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GJ Titans | Official Website</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="css/home-single.css" />
</head>

<body>
  <section class="scene" id="scene">

    <div class="scene-hint">CLICK LOGO</div>

    <!-- ✅ LOGO -->
    <button class="logo-core" id="logoCore" type="button">
      <img src="images/logo.png" alt="GJ Titans Logo">
    </button>

    <!-- ✅ RADIAL MENU -->
    <div class="radial-menu">

      <button class="menu-item" data-key="squad" type="button">
        <img src="images/squad.png" alt="Squad">
        <span>SQUAD</span>
      </button>

      <button class="menu-item" data-key="gallery" type="button">
        <img src="images/gallery.png" alt="Gallery">
        <span>GALLERY</span>
      </button>

      <button class="menu-item" data-key="fixtures" type="button">
        <img src="images/fixtures.png" alt="Fixtures">
        <span>FIXTURES</span>
      </button>

    </div>

    <!-- ✅ CONTENT OVERLAY -->
    <div class="overlay" id="overlay">
      <div class="overlay-content">
        <button class="close-btn" id="closeOverlay" type="button">✕</button>
        <div id="overlayBody"></div>
      </div>
    </div>

  </section>

  <!-- ✅ JS -->
  <script src="js/home-single.js"></script>
</body>
</html>
