<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GJ Titans | Official Website</title>

  <link rel="stylesheet" href="assets/css/home-single.css" />
</head>

<body>
<section class="scene" id="scene">

  <div class="scene-hint">Tap the Badge to start</div>

  <!-- Center Logo -->
  <button class="logo-core" id="logoCore" type="button" aria-label="Open menu">
    <img src="assets/images/logo.png" alt="GJ Titans Logo" />
  </button>

  <!-- Radial Menu -->
  <div class="radial-menu" aria-label="Primary navigation">
    <button class="menu-item" data-key="squad" type="button" aria-label="Squad">
      <img src="assets/images/squad.png" alt="" />
      <span><b>Squad</b></span>
    </button>

    <button class="menu-item" data-key="gallery" type="button" aria-label="Gallery">
      <img src="assets/images/gallery.png" alt="" />
      <span><b>Gallery</b></span>
    </button>

    <button class="menu-item" data-key="fixtures" type="button" aria-label="Fixtures">
      <img src="assets/images/fixtures.png" alt="" />
      <span><b>Fixtures</b></span>
    </button>
  </div>

  <!-- Content Overlay -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="overlay-content" role="dialog" aria-modal="true" aria-label="Content">
      <button class="close-btn" id="closeOverlay" type="button" aria-label="Close overlay">✕</button>
      <div id="overlayBody"></div>
    </div>
  </div>

</section>

<script src="assets/js/home-single.js"></script>
</body>
</html>
